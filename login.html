<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./public/main.css" />
    <title>Document</title>
  </head>
  <!-- replace the bg-color -->
  <body class="bg-orange font-sans">
    <!-- outer container -->
    <div class="flex flex-row justify-center items-stretch">
      <!-- placeholder for the image in big screen -->
      <div class="md:block md:w-1/2 hidden sticky top-0 h-screen">
        <img
          src="./images/Rectangle_9.jpg"
          alt=""
          class="h-full object-cover w-full"
        />
      </div>

      <!--headers and form  -->
      <div
        class="flex flex-col w-full md:w-1/2 items-center justify-center space-y-5 mt-10 px-6"
      >
        <!-- logo and header container -->
        <div class="flex flex-row justify-center items-center gap-1">
          <!-- brightness-0 turns all the pixels black and invert makes them white -->
          <img
            src="./images/Pantry_Swap_Icon.png"
            class="w-5 h-5 brightness-0 invert"
            alt=""
          />
          <h1 class="text-white">Pantry Swap</h1>
        </div>

        <h2 class="text-center pb-10 text-white">
          Help Your Community Prevent Food Waste.
        </h2>

        <!-- form for log in -->
        <form
          action="submit"
          id="LoginForm"
          class="card shadow-sm flex flex-col p-4 space-y-6 md:w-1/2 w-full min-h-50"
        >
          <div class="flex flex-col space-y-1">
            <label class="font-bold" for="">Email</label>
            <input
              type="text"
              id="emailLogin"
              placeholder="Email"
              class="text-sm border border-gray-300 rounded-lg p-2"
            />
          </div>

          <div class="flex flex-col space-y-1">
            <label class="font-bold" for="">Password</label>
            <input
              type="password"
              id="passwordLogin"
              placeholder="Password"
              class="text-sm border border-gray-300 rounded-lg p-2"
            />
          </div>
          <div class="flex items-center gap-2">
            <input
              class="size-5"
              type="checkbox"
              id="RememberLogin"
              name="Remember Me"
            /><span>Remember Me</span>
          </div>
          <!-- invalid credentials placeholder -->
          <div
            id="errorMsg"
            class="flex items-center gap-2 text-sm text-red hidden"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="red"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="white"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
              />
            </svg>
            <span>Invalid credentials, Please try again!</span>
          </div>
          <button
            type="submit"
            id="LoginBtn"
            class="hover-bright box-color-0 rounded-lg w-fit p-1 px-4 cursor-pointer"
          >
            Login
          </button>
        </form>

        <!-- form for sign up, we remain on the same page -->
        <form
          action="submit"
          id="SignUpForm"
          class="hidden card shadow-sm flex flex-col p-4 space-y-6 md:w-1/2 w-full min-h-50"
        >
          <div class="flex flex-col space-y-1">
            <label class="font-bold" for="">Name</label>
            <input
              type="text"
              id="name"
              placeholder="Name"
              class="text-sm border border-gray-300 rounded-lg p-2"
            />
          </div>

          <div class="flex flex-col space-y-1">
            <label class="font-bold" for="">Email</label>
            <input
              type="text"
              placeholder="Email"
              id="emailSignup"
              class="text-sm border border-gray-300 rounded-lg p-2"
            />
            <button
              type="button"
              id="sendOtpBtn"
              class="w-fit hover-bright box-color-0 rounded-lg px-3 p-1 mt-1 text-sm cursor-pointer whitespace-nowrap"
            >
              Send Code
            </button>
          </div>

          <!-- OTP — hidden until Send Code is clicked -->
          <div class="flex flex-col space-y-1 hidden" id="otpSection">
            <label class="font-bold" for="">Verification Code</label>
            <input
              type="text"
              id="OTP"
              maxlength="6"
              placeholder="6-digit code"
              class="text-sm border border-gray-300 rounded-lg p-2"
            />
            <button
              type="button"
              id="verifyOtpBtn"
              class="w-fit hover-bright box-color-0 rounded-lg px-3 p-1 mt-1 text-sm cursor-pointer"
            >
              Verify
            </button>
          </div>

          <!-- shown after OTP is verified -->
          <div
            id="verifiedMsg"
            class="hidden text-sm text-green-600 font-medium"
          >
            Email verified!
          </div>

          <!-- hidden until OTP is verified -->
          <div id="postVerifySection" class="hidden flex flex-col space-y-4">
            <div class="flex flex-col space-y-1">
              <label class="font-bold" for="">Password</label>
              <input
                type="password"
                id="passwordSignup"
                placeholder="Password"
                class="text-sm border border-gray-300 rounded-lg p-2"
              />
            </div>
            <div class="flex items-center gap-2">
              <input
                class="size-5"
                type="checkbox"
                id="RememberSignup"
                name="Remember Me"
              /><span>Remember Me</span>
            </div>
          </div>

          <div
            id="signupErrorMsg"
            class="flex items-center gap-2 text-sm text-red hidden"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="red"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="white"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
              />
            </svg>
            <span id="signupErrorText"></span>
          </div>
          <button
            type="submit"
            id="signupBtn"
            class="hover-bright rounded-lg w-fit p-1 px-4 box-color-0 cursor-pointer hidden"
          >
            Create Account
          </button>
        </form>

        <button
          type="button"
          id="SignUpButton"
          class="text-white text-sm cursor-pointer"
        >
          Not registered? <span class="underline">Create an account</span>
        </button>
        <button
          type="button"
          id="LoginButton"
          class="text-white text-sm cursor-pointer hidden"
        >
          Have an account? <span class="underline">Back to Login</span>
        </button>
      </div>
    </div>

    <script src="./src/scripts/login.js"></script>
  </body>
</html>
