<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <site-navbar></site-navbar>
    <!-- form -->
    <form
      action=""
      class="flex flex-col md:max-w-2xl p-10 space-y-4 bg-white shadow-lg mx-auto"
    >
      <h1>My account</h1>
      <!-- profile image and name container -->
      <div class="flex flex-row gap-7">
        <img src="" alt="" />
        <!-- container of name and city -->
        <div class="flex flex-col gap-1">
          <p id="UserCurrentName">John Smith</p>
          <p id="Usercity">Vancouver</p>
        </div>
      </div>
      <button type="button" class="border-1 border-black w-fit p-1 rounded-md">
        Upload Photo
      </button>

      <!-- input elements -->
      <!-- name -->
      <div class="flex flex-col gap-1">
        <label for="">Name</label>
        <input
          type="text"
          id="UserNewName"
          class="border border-black rounded-md"
        />
      </div>
      <!-- email -->
      <label for="">Email</label>
      <input
        type="text"
        id="UserNewEmail"
        class="border border-black rounded-md"
      />
      <!-- contact -->
      <label for="">Contact Informatio for Buyers</label>
      <input
        type="text"
        id="UserNewphone"
        class="border border-black rounded-md"
      />
      <!-- town -->
      <label for="">Town / city</label>
      <input
        type="text"
        id="UserNewCity"
        class="border border-black rounded-md"
      />
    </form>

    <script src="./src/components/navbar.js"></script>
  </body>
</html>
