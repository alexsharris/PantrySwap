<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantry Swap</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="/src/components/navbar.js"></script>
    <link rel="stylesheet" href="./public/main.css" />
  </head>
  <body class="site-margins">
    <site-navbar></site-navbar>
    
      <!-- form -->
      <form
        action="submit" id="AccountForm"
        class="flex flex-col w-full min-h-full p-6 md:max-w-xl md:p-10 space-y-4 md:rounded-3xl md:bg-white md:shadow-[0_4px_10px_rgba(0,0,0,0.10)] md:mx-auto md:my-8 pb-25 md:pb-5"
      >
        <h1 class="mb-10 font-bold">My account</h1>

        <!-- profile image and name container -->
        <div class="flex flex-row items-center gap-7">
          <img
            src="images/businessShark.jpg"
            alt=""
            class="object-cover rounded-full w-20 h-20"
          />

          <!-- container of name and city -->
          <div class="flex flex-col gap-1">
            <h2 class="font-bold" id="UserCurrentName">John Smith</h2>
            <p id="Usercity">Vancouver</p>
          </div>
        </div>
        <button
          type="button"
          class="button box-color-5 border border-medium-grey w-fit hover-outline hover-accent-text "
        >
          Upload Photo
        </button>

        <!-- input elements -->
        <!-- name -->
        <div class="flex flex-col gap-1">
          <label for="">Name</label>
          <input
            type="text"
            id="UserNewName"
            placeholder="Name"
          />
        </div>

        <!-- email -->
        <div class="flex flex-col gap-1">
          <label for="">Email</label>
          <input
            type="text"
            id="UserNewEmail"
            placeholder="Email"
          />
        </div>

        <!-- contact -->
        <div class="flex flex-col gap-1">
          <label for="">Contact Information for Buyers</label>
          <input
            type="text"
            id="UserNewphone"
            placeholder="Phone Number"
          />
        </div>

        <!-- town -->
        <div class="flex flex-col gap-1">
          <label for="">Town / city</label>
          <input
            type="text"
            id="UserNewCity"
            placeholder="City"
          />
        </div>

        <!-- buttons -->
        <div class="flex flex-row gap-3 mt-3">
          <button
            type="button" id="DeleteAccount"
            class="button box-color-4 hover-bright"
          >
            Delete Account
          </button>
          <button
            type="submit"
            class="button box-color-5 border border-medium-grey hover-outline hover-accent-text "
          >
            Save Changes
          </button>
        </div>
      </form>
    <script src="/src/scripts/account.js"></script>
  </body>
</html>
