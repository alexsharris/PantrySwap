<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantry Swap</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="/src/components/navbar.js"></script>
    <link rel="stylesheet" href="./public/main.css" />
  </head>
  <body class="min-h-screen flex flex-col">
    <site-navbar></site-navbar>
    <div class="site-margins">
      <!-- Add main content here! -->
      <!-- form -->
      <form
        action="submit"
        id="AccountForm"
        class="flex flex-col w-full min-h-full p-6 md:max-w-xl md:p-10 space-y-4 md:rounded-3xl md:bg-white md:shadow-[0_4px_10px_rgba(0,0,0,0.10)] md:mx-auto md:my-8 pb-25 md:pb-5"
      >
        <h1 class="mb-10 font-bold">My account</h1>

        <!-- profile image and name container -->
        <div class="flex flex-row items-center gap-7">
          <img
            src="images/businessShark.jpg"
            alt=""
            class="object-cover rounded-full w-20 h-20" id="userPFP"
          />

          <!-- container of name and city -->
          <div class="flex flex-col gap-1">
            <h2 class="font-bold" id="UserCurrentName"></h2>
            <p id="Usercity"></p>
          </div>
        </div>
        <input type="file" id="userProfilePic" />
        <button
          type="button"
          class="button box-color-5 border border-medium-grey w-fit hover-outline hover-accent-text" id="profilePicBtn">
          Upload Photo
        </button>

        <!-- input elements -->
        <!-- name -->
        <div class="flex flex-col gap-1">
          <label for="">Name</label>
          <input type="text" id="UserNewName" placeholder="Name" />
        </div>

        <!-- email -->
        <div class="flex flex-col gap-1">
          <label for="">Email</label>
          <input type="text" id="UserNewEmail" placeholder="Email" />
        </div>

        <!-- contact -->
        <div class="flex flex-col gap-1">
          <label for="">Contact Information for Buyers</label>
          <input type="text" id="UserNewphone" placeholder="Phone Number" />
        </div>

        <!-- town -->
        <div class="flex flex-col gap-1">
          <label for="">Town / city</label>
          <input type="text" id="UserNewCity" placeholder="City" />
        </div>
        <!-- address -->
         <div class="flex flex-col gap-1">
          <label for="">Address</label>
          <input type="text" id="UserNewAddress" placeholder="Address" />
        </div>
        <!-- postal code -->
         <div class="flex flex-col gap-1">
          <label for="">Postal code</label>
          <input type="text" id="UserNewPostalCode" placeholder="Postal code" />
        </div>
        <!-- buttons -->
        <div class="flex flex-row gap-3 mt-3">
          <button
            type="button"
            id="DeleteAccount"
            class="button box-color-4 hover-bright"
          >
            Delete Account
          </button>
          <button
            type="submit"
            class="button box-color-5 border border-medium-grey hover-outline hover-accent-text"
          >
            Save Changes
          </button>
        </div>
      </form>
    </div>

    <script type="module" src="/src/scripts/account.js"></script>
  </body>
</html>
